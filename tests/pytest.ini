[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --alluredir=./allure-results --clean-alluredir
markers =
    smoke: 冒烟测试
    regression: 回归测试
    api: API接口测试
    auth: 认证相关测试
    reservation: 预约相关测试
    lab: 实验室相关测试
    device: 设备相关测试
    consumable: 耗材相关测试
    announcement: 公告相关测试
    user: 用户相关测试
    statistics: 统计相关测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning

# ==================== 实验室管理系统 - 唯一配置文件 ====================
# 所有环境配置集中于此文件，通过 SPRING_PROFILES_ACTIVE 切换
# 配置来源: config/config.yaml → 环境变量 → 此文件默认值
# 遵循 MICRO_SERVICE_SPEC.md 第 2.1 节 "唯一配置文件" 原则
# =====================================================================

# ==================== 默认配置 (dev环境) ====================
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:lab-management}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://localhost:3306/lab_management?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: ${JWT_SECRET:dev-lab-management-secret-key-2024}
  expiration: 86400000

logging:
  level:
    root: info
    com.labmanagement: info
    org.springframework: info
    org.mybatis: info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000
  security:
    rate-limit:
      enabled: false
  storage:
    type: local
    local:
      path: ./uploads-dev
  notification:
    email:
      enabled: false
    sms:
      enabled: false

---
# ==================== 测试环境 (test) ====================
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lab_management_test}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:labuser}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1

jwt:
  secret: ${JWT_SECRET:test-lab-management-secret-key-2024}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: info
    com.labmanagement: debug
    org.springframework: info
    org.mybatis: info

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://test.example.com}
  security:
    rate-limit:
      enabled: true
      requests-per-minute: 120
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      path: ${STORAGE_LOCAL_PATH:/data/uploads/test}
  notification:
    email:
      enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    sms:
      enabled: ${NOTIFICATION_SMS_ENABLED:false}

---
# ==================== 生产环境 (prod) ====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: info
    com.labmanagement: info
    org.springframework: warn
    org.mybatis: warn

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: true
      threshold: 100MB
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: prod

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  security:
    rate-limit:
      enabled: true
      requests-per-minute: 60
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      path: ${STORAGE_LOCAL_PATH:/data/uploads}
    max-size: 20MB
  business:
    reservation:
      max-days-in-advance: 30
      max-hours-per-day: 8
    device:
      max-borrow-days: 30
    consumable:
      warning-threshold: 10
      auto-warning-enabled: true
  notification:
    email:
      enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    sms:
      enabled: ${NOTIFICATION_SMS_ENABLED:false}

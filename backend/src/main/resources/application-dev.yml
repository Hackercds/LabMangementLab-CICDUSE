# ==================== 开发环境配置 ====================
server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lab_management?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

# JWT配置
jwt:
  secret: dev-lab-management-secret-key-2024
  expiration: 86400000

# 日志配置
logging:
  level:
    root: info
    com.labmanagement: debug
    org.springframework: info
    org.mybatis: debug
  file:
    name: logs/lab-management-dev.log

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 应用配置
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000
  
  security:
    rate-limit:
      enabled: false
  
  storage:
    type: local
    local:
      path: ./uploads-dev
  
  notification:
    email:
      enabled: false
    sms:
      enabled: false

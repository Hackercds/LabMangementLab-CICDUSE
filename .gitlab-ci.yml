# GitLab CI/CD配置文件
# 实验室管理系统自动化部署流程

stages:
  - build
  - test
  - quality
  - docker
  - deploy
  - smoke-test

variables:
  MAVEN_CLI_OPTS: "-s .m2/settings.xml --batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  DOCKER_REGISTRY: registry.example.com
  DOCKER_IMAGE_BACKEND: $DOCKER_REGISTRY/lab-management-backend
  DOCKER_IMAGE_FRONTEND: $DOCKER_REGISTRY/lab-management-frontend

cache:
  paths:
    - .m2/repository/
    - backend/target/
    - frontend/node_modules/

# ==================== 构建阶段 ====================
backend-build:
  stage: build
  image: maven:3.8-openjdk-21
  script:
    - echo "🔨 构建后端项目..."
    - cd backend
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
    - ls -la target/
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 1 hour

frontend-build:
  stage: build
  image: node:18-alpine
  script:
    - echo "🔨 构建前端项目..."
    - cd frontend
    - npm install
    - npm run build
    - ls -la dist/
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

# ==================== 测试阶段 ====================
backend-test:
  stage: test
  image: maven:3.8-openjdk-21
  script:
    - echo "🧪 运行后端单元测试..."
    - cd backend
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    reports:
      junit: backend/target/surefire-reports/TEST-*.xml
    paths:
      - backend/target/surefire-reports/
    expire_in: 1 week

frontend-test:
  stage: test
  image: node:18-alpine
  script:
    - echo "🧪 运行前端单元测试..."
    - cd frontend
    - npm install
    - npm run test:unit || true
  artifacts:
    reports:
      junit: frontend/test-results/*.xml
    expire_in: 1 week

# ==================== 代码质量检查 ====================
backend-quality:
  stage: quality
  image: maven:3.8-openjdk-21
  script:
    - echo "🔍 后端代码质量检查..."
    - cd backend
    - mvn $MAVEN_CLI_OPTS checkstyle:check || true
    - mvn $MAVEN_CLI_OPTS spotbugs:check || true
  allow_failure: true

frontend-quality:
  stage: quality
  image: node:18-alpine
  script:
    - echo "🔍 前端代码质量检查..."
    - cd frontend
    - npm install
    - npm run lint || true
  allow_failure: true

# ==================== Docker镜像构建 ====================
docker-backend:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "🐳 构建后端Docker镜像..."
    - cd backend
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker build -t $DOCKER_IMAGE_BACKEND:$CI_COMMIT_SHA .
    - docker tag $DOCKER_IMAGE_BACKEND:$CI_COMMIT_SHA $DOCKER_IMAGE_BACKEND:latest
    - docker push $DOCKER_IMAGE_BACKEND:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE_BACKEND:latest
  only:
    - main
    - develop

docker-frontend:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "🐳 构建前端Docker镜像..."
    - cd frontend
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker build -t $DOCKER_IMAGE_FRONTEND:$CI_COMMIT_SHA .
    - docker tag $DOCKER_IMAGE_FRONTEND:$CI_COMMIT_SHA $DOCKER_IMAGE_FRONTEND:latest
    - docker push $DOCKER_IMAGE_FRONTEND:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE_FRONTEND:latest
  only:
    - main
    - develop

# ==================== 部署阶段 ====================
deploy-staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "🚀 部署到测试环境..."
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $DEPLOY_SERVER >> ~/.ssh/known_hosts
    - |
      ssh $DEPLOY_USER@$DEPLOY_SERVER << EOF
        cd /opt/lab-management
        docker-compose pull
        docker-compose down
        docker-compose up -d
        sleep 30
        docker-compose ps
      EOF
  environment:
    name: staging
    url: http://staging.example.com
  only:
    - develop

deploy-production:
  stage: deploy
  image: alpine:latest
  script:
    - echo "🚀 部署到生产环境..."
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $DEPLOY_SERVER >> ~/.ssh/known_hosts
    - |
      ssh $DEPLOY_USER@$DEPLOY_SERVER << EOF
        cd /opt/lab-management
        ./scripts/backup.sh
        docker-compose -f docker-compose.prod.yml pull
        ./scripts/blue-green-deploy.sh
        sleep 30
        ./scripts/health-check.sh
      EOF
  environment:
    name: production
    url: http://www.example.com
  only:
    - main
  when: manual

# ==================== 冒烟测试 ====================
smoke-test:
  stage: smoke-test
  image: python:3.11
  script:
    - echo "🧪 运行冒烟测试..."
    - cd tests
    - pip install -r requirements.txt
    - python run_tests.py smoke
  artifacts:
    paths:
      - tests/reports/allure-results/
      - tests/reports/smoke-report.html
    expire_in: 1 month
  only:
    - main
    - develop

# ==================== API自动化测试 ====================
api-test:
  stage: smoke-test
  image: python:3.11
  script:
    - echo "🧪 运行API自动化测试..."
    - cd tests
    - pip install -r requirements.txt
    - python run_tests.py full
  artifacts:
    paths:
      - tests/reports/allure-results/
      - tests/reports/full-report.html
    expire_in: 1 month
  only:
    - develop
  allow_failure: true

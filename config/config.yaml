# 实验室管理系统 - 唯一配置文件
# 遵循 MICRO_SERVICE_SPEC.md 第 1.1 节 + 第 2.1 节
# 路径: config/config.yaml (提交到Git)

app:
  host: "maco.hackercd.cn"
  backend_port: 10081
  frontend_port: 10080

database:
  host: "mysql"
  port: 3306
  name: "lab_management"
  user: "labuser"
  root_password: "root123456"
  app_password: "lab123456"

redis:
  host: "redis"
  port: 6379
  password: ""
  database: 0

jwt:
  secret: "lab-management-jwt-secret-key-2026-production"
  expiration: 86400000

spring:
  profiles_active: "prod"

cors:
  allowed_origins: "*"

java:
  opts: "-Xms512m -Xmx1024m -XX:+UseG1GC"

monitor:
  enabled: true

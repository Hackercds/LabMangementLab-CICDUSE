#!/bin/bash

# 实验室管理系统 - 部署配置文件
# 支持多语言项目配置

# ============================================
# 项目基础配置
# ============================================
PROJECT_NAME="lab-management-system"
PROJECT_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"

# 日志和PID目录
LOG_DIR="${PROJECT_ROOT}/logs"
PID_DIR="${PROJECT_ROOT}/pids"

# ============================================
# Java 服务配置
# ============================================
JAVA_ENABLED=true
JAVA_SERVICE_NAME="backend"
JAVA_PORT=8081
JAVA_JAR_PATH="${PROJECT_ROOT}/backend/target/lab-management-backend.jar"
JAVA_SOURCE_PATH="${PROJECT_ROOT}/backend"
JAVA_JVM_OPTS="-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
JAVA_SPRING_PROFILE="dev"
JAVA_MAVEN_OPTS="-DskipTests"

# ============================================
# Python 服务配置
# ============================================
PYTHON_ENABLED=false
PYTHON_SERVICE_NAME="python-service"
PYTHON_PORT=5000
PYTHON_SCRIPT_PATH="${PROJECT_ROOT}/python-service/app.py"
PYTHON_VENV_PATH="${PROJECT_ROOT}/python-service/venv"
PYTHON_REQUIREMENTS="${PROJECT_ROOT}/python-service/requirements.txt"

# ============================================
# Golang 服务配置
# ============================================
GOLANG_ENABLED=false
GOLANG_SERVICE_NAME="golang-service"
GOLANG_PORT=8000
GOLANG_BINARY_PATH="${PROJECT_ROOT}/golang-service/bin/server"
GOLANG_SOURCE_PATH="${PROJECT_ROOT}/golang-service"

# ============================================
# 前端服务配置
# ============================================
FRONTEND_ENABLED=true
FRONTEND_SERVICE_NAME="frontend"
FRONTEND_PORT=3000
FRONTEND_SOURCE_PATH="${PROJECT_ROOT}/frontend"
FRONTEND_BUILD_COMMAND="npm run build"
FRONTEND_DEV_COMMAND="npm run dev"

# ============================================
# 数据库配置
# ============================================
DATABASE_HOST="localhost"
DATABASE_PORT=3306
DATABASE_NAME="lab_management"
DATABASE_USER="root"
DATABASE_PASSWORD="root123456"

# ============================================
# Redis 配置
# ============================================
REDIS_HOST="localhost"
REDIS_PORT=6379
REDIS_PASSWORD=""

# ============================================
# 监控配置
# ============================================
MONITOR_ENABLED=true
MONITOR_INTERVAL=60
MONITOR_LOG="${LOG_DIR}/monitor.log"

# 健康检查配置
HEALTH_CHECK_ENABLED=true
HEALTH_CHECK_INTERVAL=30
HEALTH_CHECK_TIMEOUT=10

# 告警配置
ALERT_ENABLED=false
ALERT_EMAIL=""
ALERT_WEBHOOK=""

# ============================================
# 自拉起配置
# ============================================
DAEMON_ENABLED=true
DAEMON_CHECK_INTERVAL=30
DAEMON_MAX_RESTART_COUNT=5
DAEMON_RESTART_DELAY=10

# ============================================
# 备份配置
# ============================================
BACKUP_ENABLED=true
BACKUP_DIR="${PROJECT_ROOT}/backups"
BACKUP_RETENTION_DAYS=7
BACKUP_DATABASE=true
BACKUP_CONFIG=true

# ============================================
# 日志配置
# ============================================
LOG_LEVEL="INFO"
LOG_MAX_SIZE="100M"
LOG_MAX_FILES=10
LOG_COMPRESS=true

# ============================================
# 环境变量
# ============================================
export JAVA_HOME="${JAVA_HOME:-/usr/lib/jvm/java-11}"
export MAVEN_HOME="${MAVEN_HOME:-/usr/share/maven}"
export NODE_HOME="${NODE_HOME:-/usr/local/node}"
export GOPATH="${GOPATH:-$HOME/go}"
export PATH="${JAVA_HOME}/bin:${MAVEN_HOME}/bin:${NODE_HOME}/bin:${GOPATH}/bin:${PATH}"
